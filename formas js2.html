<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formu apstrāde ar JS</title>
</head>
<body>
    <form action="https://formtester.goodbytes.be/post.php" novalidate  method="POST">
        <label for=""></label>   
        <input type="text" name="name" id="name">
        <input type="email" name="email" id="email">
        <input type="text" name="credit_card" id="credit_card">
        <input type="text" name="per_code" id="per_code">
        <input type="password" name="password" id="">
        <input type="password" name="password_repeat" id="">
        <button type="submit">Nosūtīt</button>
    </form>

    <script>
        let form = document.querySelector('form')
       
        let errorsInForm = false

        function ievietotKļūdu(elements,teksts){
            elements.insertAdjacentHTML("afterend",`<span class="error">${teksts}</span>`)
            elements.classList.add('error')
             errorsInForm = true
        }
        function izņemtKļūdu(elements){
            elements.classList.remove('error')
            errorsInForm = false

        }

        function notīrītKļūdas(){
            for (el of form.querySelectorAll('span.error')){
                el.remove()
            }
            errorsInForm = false
        }
        

       

        form.onsubmit = function(e){

             let formValidate = [
                {
                    formElement:form[0],
                    match: /.{5,}/,
                    error:"Ievadiet vārdu"
                },
                {
                    formElement:form[1],
                    match: /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}$/i,
                    error:"Ievadiet pareizu e-pastu"
                },
                {
                    formElement:form[3],
                    match: /^(\d{6})-[012]\d{4}$/,
                    error:"Pareizu personas kodu"
                },
                {
                    formElement:form[4],
                    match: /^((?=\S*?[A-Z])(?=\S*?[a-z])(?=\S*?[0-9]).{6,})\S$/,
                    error:"Parolei jāsastāv vismaz no 6 simboliem"
                }
            
        ]




            e.preventDefault()
            notīrītKļūdas()
           

            for (item of formValidate){
                if(!item.formElement.value.match(item.match)){
                     ievietotKļūdu(item.formElement,item.error)  
                }else{
                     izņemtKļūdu(item.formElement)
                }



            }




            if(form[5].value !== form[4].value || form[5].value.length<6){
                ievietotKļūdu(form[5],"Paroles nesakrīt")   
                
            }else{
                 izņemtKļūdu(form[5])
            }  



           if(!errorsInForm){
                form.submit()
           }





            




        }


    </script>
</body>
</html>
